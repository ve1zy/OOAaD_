name: CI

on:
  pull_request:
    branches:
      - task-01-gitignore
      - task-02-ci-pipeline

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build project
      run: dotnet build --no-restore --configuration Release
      
    - name: Run tests with coverage
      run: |
        dotnet test --no-build --configuration Release \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage \
          --logger "trx;LogFileName=test-results.trx" \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      continue-on-error: true
      
    - name: Install report generator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool
      
    - name: Generate coverage report
      run: |
        reportgenerator -reports:./coverage/**/coverage.opencover.xml \
          -targetdir:./coverage/report \
          -reporttypes:Html;Cobertura;Badges \
          -assemblyfilters:+GameServer
          
    - name: Calculate coverage percentage
      id: coverage
      run: |
        coverage=$(grep -oP 'LineCoverage="\K[0-9.]+' ./coverage/report/Cobertura.xml | head -1)
        echo "coverage=$coverage" >> $GITHUB_OUTPUT
        echo "Coverage: $coverage%"
        
    - name: Check coverage threshold
      if: steps.coverage.outputs.coverage != ''
      run: |
        coverage=$(echo "${{ steps.coverage.outputs.coverage }}" | cut -d. -f1)
        if [ "$coverage" -lt 90 ]; then
          echo "Coverage ($coverage%) is below 90% threshold"
          exit 1
        fi
        echo "Coverage ($coverage%) meets 90% threshold"
        
    - name: Comment PR with coverage report
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverage = '${{ steps.coverage.outputs.coverage }}';
          const comment = `
          ## Code Coverage Report
          
          **Coverage: ${coverage}%**
          
          ${coverage >= 90 ? '✅ Coverage meets 90% threshold' : '❌ Coverage is below 90% threshold'}
          
          Coverage report generated successfully.
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
          
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./coverage/report
