name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore GameServer.sln
      
    - name: Build
      run: dotnet build GameServer.sln --configuration Release --no-restore

    - name: Test (with coverage)
      run: dotnet test GameServer.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"
      
    - name: Generate coverage report
      uses: danielpalme/ReportGenerator-GitHub-Action@5.3.6
      with:
        reports: '**/coverage.cobertura.xml'
        targetdir: 'coverage-report'
        reporttypes: 'Html;Cobertura'
        
    - name: Check coverage threshold (only for PRs to main)
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
          BASE_REF="${GITHUB_BASE_REF}";
        else
          BASE_REF="${GITHUB_REF_NAME}";
        fi

        if [[ "${BASE_REF}" != "main" ]]; then
          echo "Skipping coverage gate (base ref is '${BASE_REF}', not 'main')."
          exit 0
        fi

        if [[ ! -f "coverage-report/Cobertura.xml" ]]; then
          echo "Coverage report not found at coverage-report/Cobertura.xml"
          exit 1
        fi

        coverage=$(grep -oP 'line-rate="\K[0-9.]+' coverage-report/Cobertura.xml | head -1)
        coverage_percent=$(echo "$coverage * 100" | bc)
        echo "Coverage: $coverage_percent%"

        if (( $(echo "$coverage_percent < 90" | bc -l) )); then
          echo "Coverage ($coverage_percent%) is below 90% threshold"
          exit 1
        fi

        echo "Coverage ($coverage_percent%) meets 90% threshold"
